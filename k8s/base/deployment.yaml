apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentalo
  labels:
    app: mentalo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mentalo
  template:
    metadata:
      labels:
        app: mentalo
    spec:
      containers:
        - name: mentalo
          image: ghcr.io/kalink-studio/mentalo:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-credentials
