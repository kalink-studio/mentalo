apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentalo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ateliers-mentalo.ch
      secretName: mentalo-tls
  rules:
    - host: ateliers-mentalo.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mentalo
                port:
                  number: 3000
